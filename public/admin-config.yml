backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: "news"
    label: "News & Bulletins"
    folder: "src/content/news"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - {
          label: "Date",
          name: "date",
          widget: "datetime",
          format: "YYYY-MM-DD",
        }
      - {
          label: "Featured",
          name: "featured",
          widget: "boolean",
          default: false,
        }
      - {
          label: "Image Emoji",
          name: "emoji",
          widget: "string",
          hint: "Pick one emoji: 🌱 🌿 💧 🦋 🥕 🌻 🐝 🎉 🍽️ 🔧 📋 etc.",
        }
      - {
          label: "Excerpt",
          name: "excerpt",
          widget: "string",
          hint: "Short summary for the news listing",
        }
      - { label: "Content", name: "body", widget: "markdown" }
